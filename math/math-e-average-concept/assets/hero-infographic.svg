<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff4e6"/>
      <stop offset="1" stop-color="#fff0f3"/>
    </linearGradient>
  </defs>
  <rect width="720" height="360" rx="18" fill="url(#bg)"/>

  <!-- title -->
  <text x="36" y="56" font-size="30" font-weight="700" fill="#ff6b6b">平均数 = 匀一匀</text>
  <text x="36" y="86" font-size="16" fill="#7a6a5f">把大的补给小的，最后每堆都一样多</text>

  <!-- baseline -->
  <line x1="60" y1="300" x2="660" y2="300" stroke="#e3d6c8" stroke-width="2"/>

  <!-- bars: 5,9,7,3 -->
  <g>
    <!-- 5 -->
    <rect x="110" y="270" width="60" height="30" rx="6" fill="#ffd166"/>
    <text x="140" y="290" font-size="15" fill="#5b4636" text-anchor="middle">5</text>
    <!-- 9 -->
    <rect x="220" y="210" width="60" height="90" rx="6" fill="#ff6b6b"/>
    <text x="250" y="230" font-size="15" fill="#fff" text-anchor="middle">9</text>
    <!-- 7 -->
    <rect x="330" y="240" width="60" height="60" rx="6" fill="#4ecdc4"/>
    <text x="360" y="260" font-size="15" fill="#fff" text-anchor="middle">7</text>
    <!-- 3 -->
    <rect x="440" y="285" width="60" height="15" rx="6" fill="#a78bfa"/>
    <text x="470" y="305" font-size="15" fill="#fff" text-anchor="middle">3</text>
  </g>

  <!-- dashed mean line at 6 -> height: 300 - 6*30 = 120 -->
  <line x1="80" y1="120" x2="640" y2="120" stroke="#ff6b6b" stroke-width="2.5" stroke-dasharray="8 7"/>
  <text x="560" y="112" font-size="16" font-weight="700" fill="#ff6b6b">平均数 = 6</text>

  <!-- arrow + equal result -->
  <text x="560" y="200" font-size="26" fill="#bbada0">➜</text>
  <g>
    <rect x="560" y="220" width="42" height="60" rx="6" fill="#ffb3ba"/>
    <rect x="610" y="220" width="42" height="60" rx="6" fill="#ffb3ba"/>
  </g>
  <text x="631" y="296" font-size="13" fill="#9b8d80" text-anchor="middle">每人 6 块</text>

  <!-- footer -->
  <text x="36" y="338" font-size="13" fill="#a89a8c">总数 24 ÷ 个数 4 = 6 · 移多补少后四堆等高</text>
</svg>
