<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>学科学习网站</title>
  <style>
    :root {
      --bg: #f7f9fc;
      --card: #ffffff;
      --text: #1f2933;
      --muted: #6b7280;
      --accent: #4f7cff;
      --accent-soft: #eef3ff;
      --border: #e5e9f0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    header {
      text-align: center;
      padding: 48px 16px 24px;
    }
    header h1 { margin: 0 0 8px; font-size: 30px; }
    header p { margin: 0; color: var(--muted); }
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }
    a.card {
      display: block;
      text-decoration: none;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      transition: transform .15s ease, box-shadow .15s ease;
    }
    a.card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(79, 124, 255, .12);
      border-color: var(--accent);
    }
    .emoji { font-size: 30px; }
    .name { font-size: 18px; font-weight: 600; margin-top: 8px; }
    .desc { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .folder { font-size: 12px; color: var(--accent); margin-top: 8px; font-family: monospace; }
    footer {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 32px 16px 48px;
    }
  </style>
</head>
<body>
  <header>
    <h1>📚 学科学习网站</h1>
    <p>按学科组织的学习资源导航 — 点击进入对应科目</p>
  </header>
  <main>
    <a class="card" href="yuwen/README.md">
      <div class="emoji">🀄</div><div class="name">语文</div>
      <div class="desc">阅读理解 · 写作 · 古诗文</div>
      <div class="folder">yuwen/</div>
    </a>
    <a class="card" href="yingyu/README.md">
      <div class="emoji">🔤</div><div class="name">英语</div>
      <div class="desc">词汇 · 语法 · 阅读</div>
      <div class="folder">yingyu/</div>
    </a>
    <a class="card" href="shuxue/README.md">
      <div class="emoji">🔢</div><div class="name">数学</div>
      <div class="desc">算术 · 代数 · 几何</div>
      <div class="folder">shuxue/</div>
    </a>
    <a class="card" href="wuli/README.md">
      <div class="emoji">⚙️</div><div class="name">物理</div>
      <div class="desc">力学 · 电学 · 光学</div>
      <div class="folder">wuli/</div>
    </a>
    <a class="card" href="huaxue/README.md">
      <div class="emoji">🧪</div><div class="name">化学</div>
      <div class="desc">物质 · 反应 · 实验</div>
      <div class="folder">huaxue/</div>
    </a>
    <a class="card" href="shengwu/README.md">
      <div class="emoji">🧬</div><div class="name">生物</div>
      <div class="desc">细胞 · 遗传 · 生态</div>
      <div class="folder">shengwu/</div>
    </a>
    <a class="card" href="lishi/README.md">
      <div class="emoji">🏛️</div><div class="name">历史</div>
      <div class="desc">中国史 · 世界史</div>
      <div class="folder">lishi/</div>
    </a>
    <a class="card" href="dili/README.md">
      <div class="emoji">🌍</div><div class="name">地理</div>
      <div class="desc">自然地理 · 人文地理</div>
      <div class="folder">dili/</div>
    </a>
    <a class="card" href="zhengzhi/README.md">
      <div class="emoji">⚖️</div><div class="name">政治</div>
      <div class="desc">道德与法治 · 国情</div>
      <div class="folder">zhengzhi/</div>
    </a>
  </main>
  <footer>学科学习网站 · 持续建设中</footer>
</body>
</html>
