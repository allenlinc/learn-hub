<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>政治 Politics · 学科学习网站</title>
  <link rel="stylesheet" href="../assets/style.css" />
</head>
<body>
  <div class="topbar">
    <div class="brand"><span class="logo">⚖️</span> 政治 Politics</div>
    <div class="links">
      <a href="../">返回首页</a>
      <a href="../README.md">项目说明</a>
    </div>
  </div>

  <section class="subject-header">
    <div class="big-emoji">⚖️</div>
    <h1>政治 <span style="color:var(--muted);font-weight:500;font-size:18px;">Politics</span></h1>
    <div class="sub">道德与法治 · 国情 · 8 个知识点</div>
  </section>

  <p class="subject-intro">政治（道德与法治）学习以法治、国情与价值观为主线，本目录整理核心知识点与时政。</p>

  <div class="search-wrap" style="max-width:520px;margin:18px auto 0;">
    <span class="icon">🔍</span>
    <input id="search" type="text" placeholder="搜索本科知识点（如 个人品德）" autocomplete="off" />
  </div>

  <div class="chapters">
    <section class="chapter" data-group>
      <h2>道德与法治</h2>
      <div class="topics">
        <div class="topic" data-search="个人品德 自尊自律与交往">
          <div class="t-title">个人品德</div>
          <div class="t-desc">自尊自律与交往</div>
        </div>
        <div class="topic" data-search="法律常识 法的概念与权利义务">
          <div class="t-title">法律常识</div>
          <div class="t-desc">法的概念与权利义务</div>
        </div>
        <div class="topic" data-search="宪法 宪法地位与基本原则">
          <div class="t-title">宪法</div>
          <div class="t-desc">宪法地位与基本原则</div>
        </div>
      </div>
    </section>
    <section class="chapter" data-group>
      <h2>国情与制度</h2>
      <div class="topics">
        <div class="topic" data-search="经济制度 社会主义市场经济">
          <div class="t-title">经济制度</div>
          <div class="t-desc">社会主义市场经济</div>
        </div>
        <div class="topic" data-search="政治制度 人民代表大会制度">
          <div class="t-title">政治制度</div>
          <div class="t-desc">人民代表大会制度</div>
        </div>
        <div class="topic" data-search="国家安全 意识形态与总体国家安全观">
          <div class="t-title">国家安全</div>
          <div class="t-desc">意识形态与总体国家安全观</div>
        </div>
      </div>
    </section>
    <section class="chapter" data-group>
      <h2>价值观与哲学</h2>
      <div class="topics">
        <div class="topic" data-search="生活与哲学 唯物辩证法与认识论">
          <div class="t-title">生活与哲学</div>
          <div class="t-desc">唯物辩证法与认识论</div>
        </div>
        <div class="topic" data-search="价值观 集体主义与人生价值">
          <div class="t-title">价值观</div>
          <div class="t-desc">集体主义与人生价值</div>
        </div>
      </div>
    </section>
  </div>

  <div id="empty" class="empty is-hidden">本科目录中没有匹配的知识点。</div>

  <footer>
    <a href="../">返回学科目录</a> · 政治 Politics
  </footer>

  <script src="../assets/app.js"></script>
</body>
</html>
