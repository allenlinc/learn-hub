<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>地理 Geography · 学科学习网站</title>
  <link rel="stylesheet" href="../assets/style.css" />
</head>
<body>
  <div class="topbar">
    <div class="brand"><span class="logo">🌍</span> 地理 Geography</div>
    <div class="links">
      <a href="../">返回首页</a>
      <a href="../README.md">项目说明</a>
    </div>
  </div>

  <section class="subject-header">
    <div class="big-emoji">🌍</div>
    <h1>地理 <span style="color:var(--muted);font-weight:500;font-size:18px;">Geography</span></h1>
    <div class="sub">自然地理 · 人文地理 · 8 个知识点</div>
  </section>

  <p class="subject-intro">地理学习包含自然地理与人文地理，本目录整理环境要素与区域特征。</p>

  <div class="search-wrap" style="max-width:520px;margin:18px auto 0;">
    <span class="icon">🔍</span>
    <input id="search" type="text" placeholder="搜索本科知识点（如 地球运动）" autocomplete="off" />
  </div>

  <div class="chapters">
    <section class="chapter" data-group>
      <h2>自然地理</h2>
      <div class="topics">
        <div class="topic" data-search="地球运动 自转、公转与四季交替">
          <div class="t-title">地球运动</div>
          <div class="t-desc">自转、公转与四季交替</div>
        </div>
        <div class="topic" data-search="大气与水圈 气压带、气候与海洋流">
          <div class="t-title">大气与水圈</div>
          <div class="t-desc">气压带、气候与海洋流</div>
        </div>
        <div class="topic" data-search="地貌 内力与外力作用">
          <div class="t-title">地貌</div>
          <div class="t-desc">内力与外力作用</div>
        </div>
      </div>
    </section>
    <section class="chapter" data-group>
      <h2>人文地理</h2>
      <div class="topics">
        <div class="topic" data-search="人口与城市 人口分布与城市化">
          <div class="t-title">人口与城市</div>
          <div class="t-desc">人口分布与城市化</div>
        </div>
        <div class="topic" data-search="农业与工业 农业区位与工业布局">
          <div class="t-title">农业与工业</div>
          <div class="t-desc">农业区位与工业布局</div>
        </div>
        <div class="topic" data-search="交通与商业 运输方式与商贸">
          <div class="t-title">交通与商业</div>
          <div class="t-desc">运输方式与商贸</div>
        </div>
      </div>
    </section>
    <section class="chapter" data-group>
      <h2>区域地理</h2>
      <div class="topics">
        <div class="topic" data-search="中国地理 自然区与经济区">
          <div class="t-title">中国地理</div>
          <div class="t-desc">自然区与经济区</div>
        </div>
        <div class="topic" data-search="世界地理 大洲、国家与区域组织">
          <div class="t-title">世界地理</div>
          <div class="t-desc">大洲、国家与区域组织</div>
        </div>
      </div>
    </section>
  </div>

  <div id="empty" class="empty is-hidden">本科目录中没有匹配的知识点。</div>

  <footer>
    <a href="../">返回学科目录</a> · 地理 Geography
  </footer>

  <script src="../assets/app.js"></script>
</body>
</html>
